name: Build plugin zip

on:
  push:
    tags:
      - "v*"

jobs:
  zip:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: |
          echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Assert version matches tag
        run: |
          PLUGIN_VERSION=$(grep -oP "(?<=\* Version: )\S+" yoko-link-checker.php)
          CONST_VERSION=$(grep -oP "(?<=define\( 'YLC_VERSION', ')\d+\.\d+\.\d+(?=')" yoko-link-checker.php)
          echo "Tag: $VERSION | Header: $PLUGIN_VERSION | Constant: $CONST_VERSION"
          if [ "$PLUGIN_VERSION" != "$VERSION" ] || [ "$CONST_VERSION" != "$VERSION" ]; then
            echo "ERROR: Version mismatch! Plugin header and YLC_VERSION constant must both match tag v$VERSION."
            exit 1
          fi

      - name: Build WP-installable zip
        run: |
          ZIP_NAME="yoko-link-checker-${VERSION}.zip"

          mkdir -p build/yoko-link-checker

          rsync -av --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".gitignore" \
            --exclude ".DS_Store" \
            --exclude "CHANGELOG.md" \
            --exclude "README.md" \
            --exclude "node_modules" \
            --exclude "vendor" \
            --exclude "build" \
            --exclude "dist" \
            --exclude "*.zip" \
            --exclude "*.log" \
            --exclude "composer.json" \
            --exclude "phpcs.xml.dist" \
            ./ build/yoko-link-checker/

          cd build
          zip -r "../${ZIP_NAME}" yoko-link-checker

      - name: Upload zip to release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b  # v2.5.0
        with:
          files: yoko-link-checker-${{ env.VERSION }}.zip
